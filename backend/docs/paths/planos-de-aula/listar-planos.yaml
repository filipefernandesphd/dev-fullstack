get:
  summary: Lista todos os planos de aula de uma sessão
  description: Retorna uma lista com todos os planos salvos para a sessão informada
  tags:
    - Planos de Aula
  parameters:
    - in: query
      name: sessaoId
      required: true
      schema:
        type: string
      description: Identificador único da sessão do navegador
      example: "sessao-12345"
  responses:
    '200':
      description: Lista de planos recuperada com sucesso
      content:
        application/json:
          schema:
            type: object
            properties:
              sucesso:
                type: boolean
                example: true
              mensagem:
                type: string
                example: Planos recuperados com sucesso
              dados:
                type: array
                items:
                  type: object
                  properties:
                    _id:
                      type: string
                      example: "67a1b2c3d4e5f67890123456"
                    titulo:
                      type: string
                      example: "Introdução à Ondulatória"
                    criadoEm:
                      type: string
                      format: date-time
                      example: "2026-06-24T15:30:00.000Z"
    '400':
      description: sessaoId não informado
      content:
        application/json:
          schema:
            $ref: '../../schemas/erro.yaml'
    '500':
      description: Erro interno ao recuperar planos
      content:
        application/json:
          schema:
            $ref: '../../schemas/erro.yaml'