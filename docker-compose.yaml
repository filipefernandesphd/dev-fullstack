name: meuplanoai

services:
  # Banco de dados MongoDB (desenvolvimento).
  #
  # Em produção usamos o MongoDB Atlas (cluster free M0); aqui, um container
  # local equivalente. O backend se conecta via MONGO_URL=mongodb://mongodb:27017/meuplanoai
  # (o host "mongodb" é o nome deste serviço dentro da rede do Compose).
  mongodb:
    container_name: mongodb
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend-dev:
    container_name: backend-dev
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    env_file:
      - ./backend/.env.development
    environment:
      # Dentro da rede do Compose, o backend alcança o banco pelo nome do
      # serviço "mongodb". Definido aqui (e não no .env.development) para que
      # `npm test` no host continue rodando sem MongoDB.
      - MONGO_URL=mongodb://mongodb:27017/meuplanoai
    # Garante que o banco suba antes do backend.
    depends_on:
      - mongodb

  backend-test:
    container_name: backend-test
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: test
    env_file:
      - ./backend/.env.development

  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # Serviço do frontend (desenvolvimento)
  frontend-dev:
    container_name: frontend-dev
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./frontend:/app
      - /app/node_modules                     # Evita apagar node_modules do container
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"   # variável a partir de ./.env (host:container)
    environment:
      - FRONTEND_PORT=${FRONTEND_PORT}        # porta usada pelo Vite dentro do container
    env_file:
      - ./frontend/.env.development           # injeta VITE_API_URL no ambiente

  frontend-test:
    container_name: frontend-test
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: test
    env_file:
      - ./frontend/.env.development           # injeta variáveis dentro do ambiente

volumes:
  ollama_data:
  mongo_data:
